spring.application.name=week3-spring-rest-demo
server.port=8080

# ===== Database (H2 in-memory, zero setup) =====
spring.datasource.url=jdbc:h2:mem:week3db
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.defer-datasource-initialization=true

# ===== Module 7 -> "Content Negotiation and Media Types" =====
spring.mvc.contentnegotiation.favor-parameter=true
spring.mvc.contentnegotiation.parameter-name=mediaType
spring.mvc.contentnegotiation.media-types.json=application/json
spring.mvc.contentnegotiation.media-types.xml=application/xml

# ===== Module 7 -> "Spring Boot Actuator for REST Monitoring" =====
management.endpoints.web.exposure.include=health,info,metrics,env
management.endpoint.health.show-details=always
management.info.env.enabled=true
info.app.name=Week 3 - Spring REST Demo
info.app.description=DN5.0 Java FSE Module 7 demo
info.app.version=1.0.0

# ===== Module 7 -> "Security and Authentication in RESTful APIs" (JWT) =====
app.jwt.secret=ThisIsADemoSecretKeyForWeek3JWTAuthDemoOnlyChangeInProd123456
app.jwt.expiration-ms=3600000

# ===== Module 7 -> "Documenting RESTful APIs" (Swagger / OpenAPI) =====
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

logging.level.com.dn5.week3=DEBUG
