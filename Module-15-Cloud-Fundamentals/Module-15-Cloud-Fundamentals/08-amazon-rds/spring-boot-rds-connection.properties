# spring-boot-rds-connection.properties
# Compare against the H2 application.properties files from Week 2/3 of this course -
# the ONLY thing that changes is the datasource URL/credentials. All the
# @Entity/@Repository/JPA code stays exactly the same.

spring.datasource.url=jdbc:postgresql://task-api-db.abcdefg1234.us-east-1.rds.amazonaws.com:5432/taskdb
spring.datasource.username=taskapi_admin
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Same Hibernate settings as before - RDS is just a regular PostgreSQL database
# from Hibernate's point of view, it doesn't know or care it's managed by AWS.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
