# ===== Module 5 -> "Setting up a Spring Project with Maven" / Spring Boot config =====
spring.application.name=week2-spring-core-jpa-demo
server.port=8080

# ===== Module 6 -> "Configuring application properties for database connection" =====
spring.datasource.url=jdbc:h2:mem:week2db
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ===== Module 6 -> "Spring Data JPA and Hibernate" (dialect + hibernate props) =====
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Batch processing with Hibernate (Module 6 subtopic)
# Ensure Hibernate creates tables BEFORE data.sql runs
spring.jpa.defer-datasource-initialization=true

spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

logging.level.com.dn5.week2=DEBUG
