spring.application.name=docker-demo-app
server.port=8080

# These come from environment variables set in docker-compose.yml, with
# local-dev fallbacks so `mvn spring-boot:run` also works without Docker.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/notesdb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
