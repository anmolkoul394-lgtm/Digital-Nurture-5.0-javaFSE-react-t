# simplelogger.properties
# Configuration file for the slf4j-simple logging backend.

# Default logging level: show INFO and above (INFO, WARN, ERROR).
# Change to "debug" or "trace" to see more detailed output.
org.slf4j.simpleLogger.defaultLogLevel=debug

# Show the date/time in each log line
org.slf4j.simpleLogger.showDateTime=true
org.slf4j.simpleLogger.dateTimeFormat=yyyy-MM-dd HH:mm:ss

# Show the short name of the logger (usually the class name) instead of the full package path
org.slf4j.simpleLogger.showShortLogName=true
