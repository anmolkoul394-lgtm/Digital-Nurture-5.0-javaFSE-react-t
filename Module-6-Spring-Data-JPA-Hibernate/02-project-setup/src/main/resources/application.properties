# In-memory H2 database - resets every time the app restarts, which is fine for learning.
spring.datasource.url=jdbc:h2:mem:bookdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Let Hibernate create/update tables based on our @Entity classes automatically
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Browser-based SQL console at http://localhost:8080/h2-console
spring.h2.console.enabled=true
